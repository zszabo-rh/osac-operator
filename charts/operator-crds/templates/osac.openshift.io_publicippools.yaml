{{- if .Values.install }}
---
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  annotations:
    "helm.sh/resource-policy": keep
    controller-gen.kubebuilder.io/version: v0.20.0
  name: publicippools.osac.openshift.io
spec:
  group: osac.openshift.io
  names:
    kind: PublicIPPool
    listKind: PublicIPPoolList
    plural: publicippools
    shortNames:
    - publicippool
    singular: publicippool
  scope: Namespaced
  versions:
  - additionalPrinterColumns:
    - jsonPath: .spec.ipFamily
      name: IPFamily
      type: string
    - jsonPath: .status.phase
      name: Phase
      type: string
    - jsonPath: .status.total
      name: Total
      type: integer
    - jsonPath: .status.available
      name: Available
      type: integer
    - jsonPath: .metadata.creationTimestamp
      name: Age
      type: date
    name: v1alpha1
    schema:
      openAPIV3Schema:
        description: PublicIPPool is the Schema for the publicippools API
        properties:
          apiVersion:
            description: |-
              APIVersion defines the versioned schema of this representation of an object.
              Servers should convert recognized schemas to the latest internal value, and
              may reject unrecognized values.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#resources
            type: string
          kind:
            description: |-
              Kind is a string value representing the REST resource this object represents.
              Servers may infer this from the endpoint the client submits requests to.
              Cannot be updated.
              In CamelCase.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#types-kinds
            type: string
          metadata:
            type: object
          spec:
            description: spec defines the desired state of PublicIPPool
            properties:
              cidrs:
                description: CIDRs is the list of CIDR blocks for this pool. All CIDRs
                  must match the declared IPFamily.
                items:
                  type: string
                minItems: 1
                type: array
              implementationStrategy:
                description: |-
                  ImplementationStrategy determines the backend used to advertise IPs (e.g., metallb-l2).
                  Defaults to metallb-l2 for v7.0.
                enum:
                - metallb-l2
                - netris
                type: string
              ipFamily:
                description: IPFamily indicates the IP address family for this pool
                  (IPv4 or IPv6)
                enum:
                - IPv4
                - IPv6
                type: string
            required:
            - cidrs
            - ipFamily
            type: object
          status:
            description: status defines the observed state of PublicIPPool
            properties:
              allocated:
                description: Allocated is the number of IPs currently allocated from
                  the pool.
                format: int64
                type: integer
              available:
                description: Available is the number of IPs available for allocation.
                format: int64
                type: integer
              conditions:
                description: Conditions holds an array of metav1.Condition that describe
                  the state of the PublicIPPool
                items:
                  description: Condition contains details for one aspect of the current
                    state of this API Resource.
                  properties:
                    lastTransitionTime:
                      description: |-
                        lastTransitionTime is the last time the condition transitioned from one status to another.
                        This should be when the underlying condition changed.  If that is not known, then using the time when the API field changed is acceptable.
                      format: date-time
                      type: string
                    message:
                      description: |-
                        message is a human readable message indicating details about the transition.
                        This may be an empty string.
                      maxLength: 32768
                      type: string
                    observedGeneration:
                      description: |-
                        observedGeneration represents the .metadata.generation that the condition was set based upon.
                        For instance, if .metadata.generation is currently 12, but the .status.conditions[x].observedGeneration is 9, the condition is out of date
                        with respect to the current state of the instance.
                      format: int64
                      minimum: 0
                      type: integer
                    reason:
                      description: |-
                        reason contains a programmatic identifier indicating the reason for the condition's last transition.
                        Producers of specific condition types may define expected values and meanings for this field,
                        and whether the values are considered a guaranteed API.
                        The value should be a CamelCase string.
                        This field may not be empty.
                      maxLength: 1024
                      minLength: 1
                      pattern: ^[A-Za-z]([A-Za-z0-9_,:]*[A-Za-z0-9_])?$
                      type: string
                    status:
                      description: status of the condition, one of True, False, Unknown.
                      enum:
                      - "True"
                      - "False"
                      - Unknown
                      type: string
                    type:
                      description: type of condition in CamelCase or in foo.example.com/CamelCase.
                      maxLength: 316
                      pattern: ^([a-z0-9]([-a-z0-9]*[a-z0-9])?(\.[a-z0-9]([-a-z0-9]*[a-z0-9])?)*/)?(([A-Za-z0-9][-A-Za-z0-9_.]*)?[A-Za-z0-9])$
                      type: string
                  required:
                  - lastTransitionTime
                  - message
                  - reason
                  - status
                  - type
                  type: object
                type: array
              desiredConfigVersion:
                description: DesiredConfigVersion is a hash of the spec, used to detect
                  spec changes and control retry behavior.
                type: string
              jobs:
                description: Jobs holds an array of JobStatus tracking provisioning
                  and deprovisioning operations
                items:
                  description: JobStatus represents the status of a provisioning or
                    deprovisioning job
                  properties:
                    blockDeletionOnFailure:
                      description: |-
                        BlockDeletionOnFailure indicates whether CR deletion should be blocked if this job fails.
                        AAP sets this to true to prevent orphaned cloud resources when deprovisioning fails.
                      type: boolean
                    configVersion:
                      description: |-
                        ConfigVersion is the DesiredConfigVersion at the time this job was triggered.
                        Used to determine retry behavior on failure: if ConfigVersion differs from
                        the current DesiredConfigVersion, a new job is triggered immediately.
                        If they match, the controller retries with exponential backoff.
                      type: string
                    jobID:
                      description: JobID is the AAP job identifier from the provisioning
                        provider API response.
                      type: string
                    message:
                      description: Message provides human-readable status or error
                        information
                      type: string
                    state:
                      description: State is the current state of the job
                      enum:
                      - Pending
                      - Waiting
                      - Running
                      - Succeeded
                      - Failed
                      - Canceled
                      - Unknown
                      type: string
                    timestamp:
                      description: Timestamp when this job was created/triggered
                      format: date-time
                      type: string
                    type:
                      description: Type indicates the operation type
                      enum:
                      - provision
                      - deprovision
                      type: string
                  required:
                  - jobID
                  - state
                  - timestamp
                  - type
                  type: object
                type: array
              phase:
                description: Phase provides a single-value overview of the state of
                  the PublicIPPool
                enum:
                - Progressing
                - Failed
                - Ready
                - Deleting
                type: string
              total:
                description: |-
                  Total is the total number of usable IP addresses across all CIDRs in this pool.
                  Uses int64 to accommodate large IPv6 CIDR ranges.
                format: int64
                type: integer
            type: object
        required:
        - spec
        type: object
    served: true
    storage: true
    subresources:
      status: {}
{{- end }}
