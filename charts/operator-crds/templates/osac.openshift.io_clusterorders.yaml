---
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  annotations:
    controller-gen.kubebuilder.io/version: v0.20.0
  name: clusterorders.osac.openshift.io
spec:
  group: osac.openshift.io
  names:
    kind: ClusterOrder
    listKind: ClusterOrderList
    plural: clusterorders
    shortNames:
    - cord
    singular: clusterorder
  scope: Namespaced
  versions:
  - additionalPrinterColumns:
    - jsonPath: .spec.templateID
      name: Template
      type: string
    - jsonPath: .status.phase
      name: Phase
      type: string
    name: v1alpha1
    schema:
      openAPIV3Schema:
        description: ClusterOrder is the Schema for the clusterorders API
        properties:
          apiVersion:
            description: |-
              APIVersion defines the versioned schema of this representation of an object.
              Servers should convert recognized schemas to the latest internal value, and
              may reject unrecognized values.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#resources
            type: string
          kind:
            description: |-
              Kind is a string value representing the REST resource this object represents.
              Servers may infer this from the endpoint the client submits requests to.
              Cannot be updated.
              In CamelCase.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#types-kinds
            type: string
          metadata:
            type: object
          spec:
            description: ClusterOrderSpec defines the desired state of ClusterOrder
            properties:
              network:
                description: Network contains cluster networking configuration.
                properties:
                  podCIDR:
                    description: |-
                      PodCIDR is the CIDR for the cluster's pod network.
                      Defaults to 10.128.0.0/14 if not specified.
                      Coarse format check only — full CIDR validation (e.g. net.ParseCIDR) is done server-side.
                    pattern: ^([0-9]{1,3}\.){3}[0-9]{1,3}/[0-9]{1,2}$
                    type: string
                  serviceCIDR:
                    description: |-
                      ServiceCIDR is the CIDR for the cluster's service network.
                      Defaults to 172.30.0.0/16 if not specified.
                      Coarse format check only — full CIDR validation (e.g. net.ParseCIDR) is done server-side.
                    pattern: ^([0-9]{1,3}\.){3}[0-9]{1,3}/[0-9]{1,2}$
                    type: string
                type: object
              nodeRequests:
                description: |-
                  NodeRequests defines the types of nodes and number of each type of node that will be used
                  to build the cluster. This value is optional and if not provided will be filled in with template-provided
                  defaults. The selected template may limit what node types you can request.
                items:
                  properties:
                    numberOfNodes:
                      description: NumberOfNodes describes the number of nodes you
                        want of the given resource class
                      type: integer
                    resourceClass:
                      description: ResourceClass describes the type of node you are
                        requesting
                      type: string
                  required:
                  - numberOfNodes
                  - resourceClass
                  type: object
                type: array
              pullSecret:
                description: |-
                  PullSecret contains credentials for authenticating to container image repositories.
                  If not provided, the provider's default pull secret is used.
                maxLength: 262144
                type: string
              releaseImage:
                description: |-
                  ReleaseImage is the OCP release image URL that controls the OpenShift version.
                  If not provided, the template's default release image is used.
                maxLength: 512
                pattern: ^.+/.+:.+$
                type: string
              sshPublicKey:
                description: |-
                  SSHPublicKey is an SSH public key installed on cluster worker nodes.
                  If not provided, the provider's default SSH key is used.
                maxLength: 16384
                type: string
              templateID:
                description: TemplateID is the unique identigier of the cluster template
                  to use when creating this cluster
                pattern: ^[a-zA-Z_][a-zA-Z0-9._]*$
                type: string
                x-kubernetes-validations:
                - message: templateID is immutable
                  rule: self == oldSelf
              templateParameters:
                description: |-
                  TemplateParameters is a JSON-encoded map of the parameter values for the
                  selected cluster template.
                type: string
            required:
            - templateID
            type: object
          status:
            description: ClusterOrderStatus defines the observed state of ClusterOrder
            properties:
              clusterReference:
                description: Reference to the namespace that contains the HostedCluster
                  resource
                properties:
                  hostedClusterName:
                    type: string
                  namespace:
                    description: Namespace that contains the HostedCluster resource
                    type: string
                  roleBindingName:
                    type: string
                  serviceAccountName:
                    type: string
                required:
                - hostedClusterName
                - namespace
                - roleBindingName
                - serviceAccountName
                type: object
              conditions:
                description: Conditions holds an array of metav1.Condition that describe
                  the state of the ClusterOrder
                items:
                  description: Condition contains details for one aspect of the current
                    state of this API Resource.
                  properties:
                    lastTransitionTime:
                      description: |-
                        lastTransitionTime is the last time the condition transitioned from one status to another.
                        This should be when the underlying condition changed.  If that is not known, then using the time when the API field changed is acceptable.
                      format: date-time
                      type: string
                    message:
                      description: |-
                        message is a human readable message indicating details about the transition.
                        This may be an empty string.
                      maxLength: 32768
                      type: string
                    observedGeneration:
                      description: |-
                        observedGeneration represents the .metadata.generation that the condition was set based upon.
                        For instance, if .metadata.generation is currently 12, but the .status.conditions[x].observedGeneration is 9, the condition is out of date
                        with respect to the current state of the instance.
                      format: int64
                      minimum: 0
                      type: integer
                    reason:
                      description: |-
                        reason contains a programmatic identifier indicating the reason for the condition's last transition.
                        Producers of specific condition types may define expected values and meanings for this field,
                        and whether the values are considered a guaranteed API.
                        The value should be a CamelCase string.
                        This field may not be empty.
                      maxLength: 1024
                      minLength: 1
                      pattern: ^[A-Za-z]([A-Za-z0-9_,:]*[A-Za-z0-9_])?$
                      type: string
                    status:
                      description: status of the condition, one of True, False, Unknown.
                      enum:
                      - "True"
                      - "False"
                      - Unknown
                      type: string
                    type:
                      description: type of condition in CamelCase or in foo.example.com/CamelCase.
                      maxLength: 316
                      pattern: ^([a-z0-9]([-a-z0-9]*[a-z0-9])?(\.[a-z0-9]([-a-z0-9]*[a-z0-9])?)*/)?(([A-Za-z0-9][-A-Za-z0-9_.]*)?[A-Za-z0-9])$
                      type: string
                  required:
                  - lastTransitionTime
                  - message
                  - reason
                  - status
                  - type
                  type: object
                type: array
              desiredConfigVersion:
                description: |-
                  DesiredConfigVersion is a hash of the current spec, used to detect spec changes
                  that require re-provisioning.
                type: string
              jobs:
                description: |-
                  Jobs tracks the history of provision and deprovision operations
                  Ordered chronologically, with latest operations at the end
                  Limited to the last N jobs (configurable via OSAC_MAX_JOB_HISTORY, default 10)
                items:
                  description: JobStatus represents the status of a provisioning or
                    deprovisioning job
                  properties:
                    blockDeletionOnFailure:
                      description: |-
                        BlockDeletionOnFailure indicates whether CR deletion should be blocked if this job fails
                        AAP Direct sets this to true to prevent orphaned cloud resources
                        EDA sets this to false as webhook handles cleanup
                      type: boolean
                    configVersion:
                      description: |-
                        ConfigVersion is the DesiredConfigVersion at the time this job was triggered.
                        Used to determine retry behavior on failure: if ConfigVersion differs from
                        the current DesiredConfigVersion, a new job is triggered immediately.
                        If they match, the controller retries with exponential backoff.
                      type: string
                    jobID:
                      description: |-
                        JobID is the job identifier from the provisioning provider
                        For AAP Direct: job ID from AAP API response
                        For EDA: auto-incremented "eda-webhook-N"
                      type: string
                    message:
                      description: Message provides human-readable status or error
                        information
                      type: string
                    state:
                      description: State is the current state of the job
                      enum:
                      - Pending
                      - Waiting
                      - Running
                      - Succeeded
                      - Failed
                      - Canceled
                      - Unknown
                      type: string
                    timestamp:
                      description: Timestamp when this job was created/triggered
                      format: date-time
                      type: string
                    type:
                      description: Type indicates the operation type
                      enum:
                      - provision
                      - deprovision
                      - attach
                      - detach
                      type: string
                  required:
                  - jobID
                  - state
                  - timestamp
                  - type
                  type: object
                type: array
              nodeRequests:
                description: NodeRequests reflects how many nodes are currently associated
                  with the ClusterOrder
                items:
                  properties:
                    numberOfNodes:
                      description: NumberOfNodes describes the number of nodes you
                        want of the given resource class
                      type: integer
                    resourceClass:
                      description: ResourceClass describes the type of node you are
                        requesting
                      type: string
                  required:
                  - numberOfNodes
                  - resourceClass
                  type: object
                type: array
              phase:
                description: Phase provides a single-value overview of the state of
                  the ClusterOrder
                enum:
                - Progressing
                - Failed
                - Ready
                - Deleting
                type: string
            type: object
        type: object
    served: true
    storage: true
    subresources:
      status: {}
