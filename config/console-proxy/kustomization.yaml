apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: osac

labels:
- includeSelectors: true
  pairs:
    app: osac-console-proxy

# auth-reader-rolebinding.yaml lives in ../console-proxy-kube-system/ because
# it targets kube-system; including it here would let the namespace transformer
# overwrite that. The installer applies it separately.
resources:
- serviceaccount.yaml
- deployment.yaml
- service.yaml
- certificate.yaml
- apiservice.yaml
- clusterrole.yaml
- clusterrolebinding.yaml
- clusterrole-secret-reader.yaml
- rolebinding-secret-reader.yaml
- clusterrolebinding-auth-delegator.yaml

images:
- name: console-proxy
  newName: ghcr.io/osac-project/osac-operator
  newTag: latest
