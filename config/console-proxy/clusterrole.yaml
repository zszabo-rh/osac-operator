apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: osac-console-proxy
rules:
- apiGroups:
  - osac.openshift.io
  resources:
  - computeinstances
  verbs:
  - get
  - list
- apiGroups:
  - subresources.kubevirt.io
  resources:
  - virtualmachineinstances/console
  verbs:
  - get
