apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
resources:
  - ../../console-proxy
images:
  - name: ghcr.io/osac-project/osac-operator
    newName: localhost/osac-operator
    newTag: latest
patches:
  - target:
      kind: Deployment
      name: osac-console-proxy
    patch: |-
      apiVersion: apps/v1
      kind: Deployment
      metadata:
        name: osac-console-proxy
      spec:
        template:
          spec:
            containers:
              - name: console-proxy
                imagePullPolicy: Never
