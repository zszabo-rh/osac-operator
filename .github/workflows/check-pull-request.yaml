name: check-generated-code

on:
  pull_request:

jobs:

  check-generated-code:
    name: Check generated code
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v7
    - uses: bufbuild/buf-action@v1
      with:
        version: '1.50.0'
        setup_only: true
    - run: |
        buf generate
        git diff --exit-code
